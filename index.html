<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard CRM — Cesar</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;
    display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .box{text-align:center;max-width:360px;padding:32px}
  .icon{font-size:48px;margin-bottom:16px}
  h1{font-size:20px;font-weight:700;margin-bottom:8px}
  p{color:#94a3b8;font-size:14px;line-height:1.6}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);
    border-top-color:#4f8ef7;border-radius:50%;animation:spin .9s linear infinite;margin:24px auto 0}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="box">
    <div class="icon">🚗</div>
    <h1>Dashboard CRM — Cesar</h1>
    <p>Aguardando primeira execução do Apps Script.<br>Os dados aparecerão em breve.</p>
    <div class="spinner"></div>
  </div>
</body>
</html>
